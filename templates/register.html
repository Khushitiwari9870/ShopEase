{% extends 'base.html' %}

{% block content %}
  <h1>Register</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div class="mb-3">
      <label class="form-label">Username</label>
      {{ form.username }}
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      {{ form.password1 }}
    </div>
    <div class="mb-3">
      <label class="form-label">Password confirmation</label>
      {{ form.password2 }}
    </div>
    <button class="btn btn-primary">Register</button>
  </form>
{% endblock %}
