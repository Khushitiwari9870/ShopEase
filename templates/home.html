{% extends 'base.html' %}

{% block content %}
  <h1 class="mb-4">Latest Products</h1>
  <div class="hero mb-4">
    <img src="/static/images/hero.svg" alt="hero" class="img-fluid rounded">
  </div>
  <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
    {% for entry in products_data %}
    <div class="col">
      <div class="card h-100">
        <img src="{{ entry.image_url }}" class="card-img-top" alt="{{ entry.product.name }}">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title"><a href="{{ entry.product.get_absolute_url }}">{{ entry.product.name }}</a></h5>
          <p class="card-text text-muted">{{ entry.product.description|truncatewords:18 }}</p>
          <div class="mt-auto d-flex justify-content-between align-items-center">
            <div>
              <strong class="text-accent h5">₹{{ entry.product.price }}</strong>
            </div>
            <div class="btn-group" role="group">
              <a href="{{ entry.product.get_absolute_url }}" class="btn btn-outline-secondary btn-sm">View</a>
              <form method="post" action="{% url 'add_to_cart' entry.product.id %}" style="display:inline">
                {% csrf_token %}
                <input type="hidden" name="quantity" value="1">
                <button class="btn btn-primary btn-sm">Add to Cart</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    {% empty %}
    <p>No products yet.</p>
    {% endfor %}
  </div>
{% endblock %}
